schemaVersion: 1
defaultBranch: main
fallbackDomains: [python]
domains:
  - id: python
    paths: ["**/*.py", "pyproject.toml"]
    inputs: ["pyproject.toml", "src/**", "tests/**"]
    commands: [["python", "-m", "pip", "install", "-e", ".[test]"], ["python", "-m", "pytest", "-q"]]
    toolchain: {python: "3.11"}
merge: {enabled: false}
