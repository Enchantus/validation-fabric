name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
      - run: python -m pip install build
      - name: Build reproducible distributions
        env:
          SOURCE_DATE_EPOCH: "315532800"
        shell: bash
        run: |
          python -m build --outdir dist
          python -m build --outdir dist-rebuild
          for artifact in dist/*; do
            cmp "$artifact" "dist-rebuild/$(basename "$artifact")"
          done
      - name: Smoke-test the clean wheel
        shell: bash
        run: |
          python -m venv "$RUNNER_TEMP/validation-fabric-smoke"
          "$RUNNER_TEMP/validation-fabric-smoke/bin/pip" install dist/*.whl
          "$RUNNER_TEMP/validation-fabric-smoke/bin/vv" --version
          mkdir "$RUNNER_TEMP/validation-fabric-consumer"
          cd "$RUNNER_TEMP/validation-fabric-consumer"
          "$RUNNER_TEMP/validation-fabric-smoke/bin/vv" init --preset python
          "$RUNNER_TEMP/validation-fabric-smoke/bin/vv" doctor
      - uses: actions/attest-build-provenance@78e6cbd37d0ac1a40113c04f2037dacf1ea3f12e # v4
        with:
          subject-path: dist/*
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: distributions
          path: dist/
      - name: Publish attested GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          release_args=(--repo "$GITHUB_REPOSITORY" --verify-tag --generate-notes)
          if [[ "$GITHUB_REF_NAME" =~ (a|b|rc)[0-9]+$ ]]; then
            release_args+=(--prerelease)
          fi
          gh release create "$GITHUB_REF_NAME" dist/* "${release_args[@]}"

  publish:
    if: vars.PYPI_PUBLISH_ENABLED == 'true'
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: distributions
          path: dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
