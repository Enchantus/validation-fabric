name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: python -m pip install build
      - run: python -m build
      - uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/*
      - uses: actions/upload-artifact@v7
        with:
          name: distributions
          path: dist/
      - name: Publish attested GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          release_args=(--repo "$GITHUB_REPOSITORY" --verify-tag --generate-notes)
          if [[ "$GITHUB_REF_NAME" =~ (a|b|rc)[0-9]+$ ]]; then
            release_args+=(--prerelease)
          fi
          gh release create "$GITHUB_REF_NAME" dist/* "${release_args[@]}"

  publish:
    if: vars.PYPI_PUBLISH_ENABLED == 'true'
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: distributions
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
