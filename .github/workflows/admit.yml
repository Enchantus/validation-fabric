name: Validation Fabric reusable privileged admission

on:
  workflow_call:
    inputs:
      tooling-ref:
        description: Immutable validation-fabric tag or commit SHA.
        required: true
        type: string
      source-run-id:
        required: true
        type: string
      base:
        required: true
        type: string
      head:
        required: true
        type: string
      head-repository:
        description: Repository containing the candidate head, including forks.
        required: false
        default: ""
        type: string
      pull-request:
        required: true
        type: string
      source-workflow:
        required: false
        default: Validation Fabric
        type: string
      source-workflow-path:
        description: Workflow file path expected for the originating run.
        required: true
        type: string
      source-event:
        description: Trusted event used by the unprivileged caller.
        required: false
        default: pull_request_target
        type: string
      source-run-title:
        description: Exact run title derived by the trusted caller from PR identity.
        required: true
        type: string
    secrets:
      certificate-key:
        required: true

permissions:
  actions: read
  contents: read
  pull-requests: read

jobs:
  admission:
    name: Validation Fabric / admission
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: ${{ inputs.head-repository || github.repository }}
          ref: ${{ inputs.head }}
          fetch-depth: 0
      - shell: bash
        run: |
          git remote add validation-fabric-base "https://github.com/${{ github.repository }}.git"
          git fetch --no-tags validation-fabric-base "${{ inputs.base }}"
          git fetch --no-tags origin "${{ inputs.head }}"
          git config --local --unset-all http.https://github.com/.extraheader || true
      - name: Load the consumer manifest from the trusted base
        shell: bash
        run: git show "${{ inputs.base }}:.validation-fabric.yml" > "$RUNNER_TEMP/validation-fabric-base.yml"
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: Enchantus/validation-fabric
          ref: ${{ inputs.tooling-ref }}
          path: .validation-fabric-tooling
          persist-credentials: false
      - uses: ./.validation-fabric-tooling
      - name: Re-read and verify the originating run and current pull request
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          mkdir -p .validation-fabric
          gh api "repos/${{ github.repository }}/actions/runs/${{ inputs.source-run-id }}" > .validation-fabric/source-run.json
          jq -e --arg workflow "${{ inputs.source-workflow }}" --arg workflow_path "${{ inputs.source-workflow-path }}" \
            --arg source_event "${{ inputs.source-event }}" --arg run_title "${{ inputs.source-run-title }}" \
            --arg repo "${{ github.repository }}" --arg head_repo "${{ inputs.head-repository || github.repository }}" \
            --arg base "${{ inputs.base }}" --arg head "${{ inputs.head }}" '
            .name == $workflow and .event == $source_event and .conclusion == "success" and
            .display_title == $run_title and .path == $workflow_path and .repository.full_name == $repo and
            (($source_event == "pull_request_target" and .head_sha == $base) or
             ($source_event == "pull_request" and .head_sha == $head))
          ' .validation-fabric/source-run.json
          gh api "repos/${{ github.repository }}/pulls/${{ inputs.pull-request }}" > .validation-fabric/pull.json
          jq -e --arg base "${{ inputs.base }}" --arg head "${{ inputs.head }}" \
            --arg head_repo "${{ inputs.head-repository || github.repository }}" \
            --arg repo "${{ github.repository }}" \
            '.state == "open" and .base.sha == $base and .head.sha == $head and
             .base.repo.full_name == $repo and .head.repo.full_name == $head_repo' \
            .validation-fabric/pull.json
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          run-id: ${{ inputs.source-run-id }}
          pattern: validation-fabric-*
          path: .validation-fabric/download
          merge-multiple: false
          github-token: ${{ github.token }}
      - name: Recompute the exact plan from trusted workflow code
        shell: bash
        run: vv --config "$RUNNER_TEMP/validation-fabric-base.yml" plan --base "${{ inputs.base }}" --head "${{ inputs.head }}" > .validation-fabric/plan.json
      - name: Verify evidence and issue the admission certificate
        env:
          VALIDATION_FABRIC_CERTIFICATE_KEY: ${{ secrets.certificate-key }}
        shell: bash
        run: |
          vv --config "$RUNNER_TEMP/validation-fabric-base.yml" admit \
            --base "${{ inputs.base }}" --head "${{ inputs.head }}" \
            --evidence-dir .validation-fabric/download \
            --repository "${{ github.repository }}" \
            --run-id "${{ inputs.source-run-id }}" \
            --pull-request "${{ inputs.pull-request }}" > .validation-fabric/certificate.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: validation-fabric-admission-${{ inputs.head }}
          path: .validation-fabric/certificate.json
          retention-days: 30
