name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        python: ["3.11", "3.12", "3.13", "3.14"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python }}
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest -q
      - run: python -m ruff check .
      - run: python -m build

  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: raven-actions/actionlint@3d39aea434753780c3b3d4a1a31c854b4dbf49d7 # v2

  fixture-adoption:
    strategy:
      fail-fast: false
      matrix:
        preset: [python, node, go, polyglot]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "22"
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.24"
      - run: python -m pip install -e .
      - run: python tools/run_fixture.py "${{ matrix.preset }}"

  release-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
      - run: python -m pip install build
      - name: Prove reproducible artifacts
        env:
          SOURCE_DATE_EPOCH: "315532800"
        shell: bash
        run: |
          one="$RUNNER_TEMP/validation-fabric-dist-one"
          two="$RUNNER_TEMP/validation-fabric-dist-two"
          python -m build --outdir "$one"
          python -m build --outdir "$two"
          for archive in "$one"/*.tar.gz "$two"/*.tar.gz; do
            gzip -cd "$archive" > "$archive.tar"
            gzip -n -9 -c "$archive.tar" > "$archive.normalized"
            mv "$archive.normalized" "$archive"
            rm "$archive.tar"
          done
          for artifact in "$one"/*; do
            cmp "$artifact" "$two/$(basename "$artifact")"
          done
      - name: Prove clean wheel installation and quick start
        shell: bash
        run: |
          python -m venv "$RUNNER_TEMP/validation-fabric-smoke"
          "$RUNNER_TEMP/validation-fabric-smoke/bin/pip" install "$RUNNER_TEMP"/validation-fabric-dist-one/*.whl
          "$RUNNER_TEMP/validation-fabric-smoke/bin/vv" --version
          mkdir "$RUNNER_TEMP/validation-fabric-consumer"
          cd "$RUNNER_TEMP/validation-fabric-consumer"
          "$RUNNER_TEMP/validation-fabric-smoke/bin/vv" init --preset python
          "$RUNNER_TEMP/validation-fabric-smoke/bin/vv" doctor
