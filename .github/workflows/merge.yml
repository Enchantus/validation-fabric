name: Validation Fabric reusable exact-candidate merge

on:
  workflow_call:
    inputs:
      tooling-ref:
        description: Immutable validation-fabric tag or commit SHA.
        required: true
        type: string
      pull-request:
        required: true
        type: string
      admitted-head:
        required: true
        type: string

permissions:
  actions: write
  contents: write
  pull-requests: write

jobs:
  merge:
    name: Validation Fabric / exact-candidate merge
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.admitted-head }}
      - uses: actions/checkout@v7
        with:
          repository: Enchantus/validation-fabric
          ref: ${{ inputs.tooling-ref }}
          path: .validation-fabric-tooling
      - uses: ./.validation-fabric-tooling
      - name: Apply the consumer's opt-in merge policy
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          vv merge --repository "${{ github.repository }}" \
            --pull-request "${{ inputs.pull-request }}" \
            --admitted-head "${{ inputs.admitted-head }}"
