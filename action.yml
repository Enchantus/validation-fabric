name: Set up Validation Fabric
description: Install the pinned Validation Fabric CLI and optional consumer toolchains.
inputs:
  python-version:
    description: Python version used to run Validation Fabric.
    default: "3.11"
  toolchain:
    description: JSON toolchain object from the selected domain.
    default: "{}"
runs:
  using: composite
  steps:
    - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
      with:
        python-version: ${{ fromJSON(inputs.toolchain).python || inputs.python-version }}
    - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
      if: ${{ fromJSON(inputs.toolchain).uv != null }}
      with:
        version: ${{ fromJSON(inputs.toolchain).uv }}
        enable-cache: true
    - shell: bash
      run: python -m pip install --disable-pip-version-check "${GITHUB_ACTION_PATH}"
    - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
      if: ${{ fromJSON(inputs.toolchain).node != null }}
      with:
        node-version: ${{ fromJSON(inputs.toolchain).node }}
    - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
      if: ${{ fromJSON(inputs.toolchain).go != null }}
      with:
        go-version: ${{ fromJSON(inputs.toolchain).go }}
